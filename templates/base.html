{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB | Student Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .x-small { font-size: 0.7rem; }
        .tracking-wider { letter-spacing: 0.05em; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg border-bottom bg-white py-2">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
                <div class="bg-primary-soft p-2 rounded-3 me-2">
                    <i class="fas fa-database text-primary"></i>
                </div>
                <span class="brand-text">DB PORTAL</span>
            </a>
            
            <div class="d-flex align-items-center gap-2">
                <div class="d-none d-md-block me-2">
                    <span class="badge bg-light text-muted fw-medium border px-3 py-2 rounded-pill small">
                        <i class="far fa-clock text-primary me-1"></i> {% now "D, d M" %}
                    </span>
                </div>
                <button type="button" class="btn btn-primary rounded-pill px-3 btn-sm d-md-none" data-bs-toggle="modal" data-bs-target="#addStudentModal">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible animate__animated animate__fadeInDown show border-0 shadow-sm rounded-3 mb-4" role="alert">
                    <div class="d-flex align-items-center">
                        <div class="icon-indicator bg-{{ message.tags }} text-white rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 28px; height: 28px;">
                            <i class="fas {% if message.tags == 'success' %}fa-check{% else %}fa-info{% endif %} x-small"></i>
                        </div>
                        <div class="fw-bold small">{{ message }}</div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss alerts
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                const bsAlert = new bootstrap.Alert(alert);
                if (bsAlert) bsAlert.close();
            });
        }, 5000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
