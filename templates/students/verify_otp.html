{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-12 col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-header bg-warning py-4 text-center border-0">
                <div class="icon-box bg-white text-warning rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                    <i class="fas fa-key fa-2x"></i>
                </div>
                <h4 class="text-dark fw-bold mb-0">OTP Verification</h4>
                <p class="text-dark-50 small mb-0">Check the admin email for the 6-digit code</p>
            </div>
            <div class="card-body p-4 p-lg-5">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show small" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted x-small mb-1 text-center d-block">ENTER OTP CODE</label>
                        <input type="text" name="otp" class="form-control bg-light border-0 py-3 text-center fs-4 fw-bold tracking-widest" maxlength="6" placeholder="000000" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 py-3 fw-bold shadow-sm rounded-3">
                        VERIFY & CONTINUE <i class="fas fa-check-circle ms-2"></i>
                    </button>
                    <div class="mt-3 text-center">
                        <a href="{% url 'login' %}" class="text-muted small text-decoration-none"><i class="fas fa-undo me-1"></i> Back to login</a>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light border-0 py-3 text-center">
                <span class="text-muted small">The code expires in 5 minutes</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
